name: Build Windows Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86, x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.arch == 'x86' && '3.7' || '3.11' }}
          architecture: ${{ matrix.arch == 'x86' && 'x86' || 'x64' }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ matrix.arch }}-${{ hashFiles('requirements/windows/${{ matrix.arch }}/requirements.txt') }}
          restore-keys: |
            pip-${{ matrix.arch }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/windows/${{ matrix.arch }}/requirements.txt
          pip install nuitka
        shell: powershell

      - name: Run tests
        run: python -m unittest discover tests -v
        shell: powershell

      - name: Build with Nuitka
        shell: powershell
        run: |
          python -m nuitka --mode=onefile `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --include-package=wx `
            --include-package-data=wx `
            --noinclude-unittest-mode=nofollow `
            --noinclude-setuptools-mode=nofollow `
            --include-data-dir=app/assets=app/assets `
            --company-name=UIMDB `
            --product-name=mvp-wxpython-example-app `
            --windows-file-version=1.0.0.0 `
            --windows-product-version=1.0.0.0 `
            --output-dir=.build `
            --windows-icon-from-ico=app\assets\icons\app-icon.ico `
            --onefile-windows-splash-screen-image=app\assets\images\logo.png `
            --output-filename=mvp-wxpython-app-windows-${{ matrix.arch == 'x86' && 'i386' || 'x64' }}.exe `
            run.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mvp-wxpython-${{ matrix.arch }}
          path: .build/mvp-wxpython-app-windows-${{ matrix.arch == 'x86' && 'i386' || 'x64' }}.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: List artifacts
        run: |
          ls -R artifacts
          find artifacts -name "*.exe" -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}