name: Build Windows Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86, x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.arch == 'x86' && '3.7' || '3.11' }}
          architecture: ${{ matrix.arch == 'x86' && 'x86' || 'x64' }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/windows/${{ matrix.arch }}/requirements.txt
          pip install nuitka

      - name: Run tests
        run: |
          python -m unittest discover tests -v

      - name: Build with Nuitka (x86)
        if: matrix.arch == 'x86'
        run: |
          python -m nuitka --mode=onefile `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --include-package=wx `
            --include-package-data=wx `
            --noinclude-unittest-mode=nofollow `
            --noinclude-setuptools-mode=nofollow `
            --include-data-dir=app/assets=app/assets `
            --company-name=UIMDB `
            --product-name=mvp-wxpython-example-app `
            --windows-file-version=1.0.0.0 `
            --windows-product-version=1.0.0.0 `
            --output-dir=.build `
            --output-filename=mvp-wxpython-app-windows-i386.exe `
            run.py

      - name: Build with Nuitka (x64)
        if: matrix.arch == 'x64'
        run: |
          python -m nuitka --mode=onefile `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --include-package=wx `
            --include-package-data=wx `
            --noinclude-unittest-mode=nofollow `
            --noinclude-setuptools-mode=nofollow `
            --include-data-dir=app/assets=app/assets `
            --company-name=UIMDB `
            --product-name=mvp-wxpython-example-app `
            --windows-file-version=1.0.0.0 `
            --windows-product-version=1.0.0.0 `
            --output-dir=.build `
            --output-filename=mvp-wxpython-app-windows-x64.exe `
            run.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mvp-wxpython-${{ matrix.arch }}
          path: .build/*.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          ls -R artifacts
          find artifacts -name "*.exe" -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
