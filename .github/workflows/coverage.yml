name: Test Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y xvfb libgtk-3-dev libwebkit2gtk-4.1-dev libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev libpango1.0-dev libcairo2-dev \
          libjpeg-dev libtiff-dev libpng-dev
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install coverage
        pip install -r requirements/linux/requirements.txt
    
    - name: Run tests with coverage
      run: |
        xvfb-run coverage run -m unittest discover -s tests
        coverage report
        coverage xml
    
    - name: Extract coverage percentage
      id: coverage
      run: |
        COVERAGE=$(coverage report | grep 'TOTAL' | awk '{print $4}' | sed 's/%//')
        echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
    
    - name: Update coverage badge in README
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = ${{ steps.coverage.outputs.coverage }};
          const color = coverage >= 80 ? 'brightgreen' : coverage >= 50 ? 'yellow' : 'red';
          const badge = `![Coverage](https://img.shields.io/badge/coverage-${coverage}%25-${color})`;
          const readmePath = 'README.md';
          let readme = fs.readFileSync(readmePath, 'utf8');
          readme = readme.replace(/<!-- coverage-badge -->/, badge);
          fs.writeFileSync(readmePath, readme);
    
    - name: Commit and push if changed
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add README.md
        git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
