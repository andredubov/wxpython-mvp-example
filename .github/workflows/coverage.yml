name: Test Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install coverage
        # wxPython is not needed for running tests in CI (GUI not required)
        # Install only test dependencies if there is a separate test-requirements file
        if [ -f requirements/linux/requirements.txt ]; then 
          # Skip wxPython installation for CI to avoid GTK+ dependencies
          pip install -r requirements/linux/requirements.txt || true
        fi
    
    - name: Run tests with coverage
      run: |
        coverage run -m unittest discover -s tests
        coverage report
        coverage xml
    
    - name: Extract coverage percentage
      id: coverage
      run: |
        COVERAGE=$(coverage report | grep 'TOTAL' | awk '{print $4}' | sed 's/%//')
        echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
    
    - name: Update coverage badge in README
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          const coverage = ${{ steps.coverage.outputs.coverage }};
          const badge = `![Coverage](https://img.shields.io/badge/coverage-${coverage}%25-brightgreen)`;
          const readmePath = 'README.md';
          let readme = fs.readFileSync(readmePath, 'utf8');
          readme = readme.replace(/<!-- coverage-badge -->/, badge);
          fs.writeFileSync(readmePath, readme);
    
    - name: Commit and push if changed
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add README.md
        git diff --staged --quiet || git commit -m "chore: update coverage badge"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
